---
- name: Restart vmagent
  ansible.builtin.systemd_service:
    name: vic-vmagent
    state: restarted
- name: Restart smokeping_prober
  ansible.builtin.systemd_service:
    name: smokeping_prober
    state: restarted
- name: Restart fluentbit
  ansible.builtin.systemd_service:
    name: fluent-bit
    state: restarted
    daemon_reload: true
- name: Reload fluentbit
  ansible.builtin.systemd_service:
    name: fluent-bit
    state: reloaded
